# =============================================================================
# VerbaFlow AI — Backend (FastAPI) Deployment + HPA
# =============================================================================

# ─── Service ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: verbaflow-backend
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-backend
    app.kubernetes.io/component: api
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: verbaflow-backend
  ports:
    - name: http
      port: 8000
      targetPort: http
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: metrics
      protocol: TCP
---
# ─── Deployment ───────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verbaflow-backend
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-backend
    app.kubernetes.io/component: api
    app.kubernetes.io/version: "1.0.0"
  annotations:
    deployment.kubernetes.io/revision: "1"
spec:
  replicas: 3
  revisionHistoryLimit: 5

  # ── Rolling Update Strategy ───────────────────────────────────────────────
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: verbaflow-backend

  template:
    metadata:
      labels:
        app.kubernetes.io/name: verbaflow-backend
        app.kubernetes.io/component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
        # Force rolling update when secrets/configmaps change
        checksum/config: "{{ include (print .Template.BasePath '/configmap.yaml') . | sha256sum }}"

    spec:
      serviceAccountName: default
      terminationGracePeriodSeconds: 30

      # ── Pod Security ────────────────────────────────────────────────────
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true

      # ── Anti-affinity: spread pods across nodes ─────────────────────────
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: verbaflow-backend
                topologyKey: "kubernetes.io/hostname"
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: verbaflow-backend
                topologyKey: "topology.kubernetes.io/zone"

      # ── Topology spread across availability zones ───────────────────────
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: "topology.kubernetes.io/zone"
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: verbaflow-backend

      # ── Init Container: wait for DB ─────────────────────────────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z verbaflow-postgres 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3
              done
              echo "PostgreSQL is ready!"
        - name: wait-for-redis
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z verbaflow-redis 6379; do
                echo "Waiting for Redis..."; sleep 3
              done
              echo "Redis is ready!"

      # ── Main Container ──────────────────────────────────────────────────
      containers:
        - name: backend
          image: ghcr.io/your-org/verbaflow-backend:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP

          # ── Environment: ConfigMap ──────────────────────────────────────
          envFrom:
            - configMapRef:
                name: verbaflow-config

          # ── Environment: Secrets ────────────────────────────────────────
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: REDIS_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: SECRET_KEY
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: GEMINI_API_KEY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: OPENAI_API_KEY
            - name: PINECONE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: PINECONE_API_KEY
            - name: SENTRY_DSN
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: SENTRY_DSN
                  optional: true

          # ── Resource Limits ─────────────────────────────────────────────
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"

          # ── Liveness Probe ──────────────────────────────────────────────
          livenessProbe:
            httpGet:
              path: /health
              port: http
              httpHeaders:
                - name: Accept
                  value: application/json
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
            successThreshold: 1

          # ── Readiness Probe ─────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1

          # ── Startup Probe ───────────────────────────────────────────────
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 30
            periodSeconds: 10

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

          volumeMounts:
            - name: uploads
              mountPath: /app/data/uploads
            - name: faiss-data
              mountPath: /app/data/faiss_indexes

      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: verbaflow-uploads-pvc
        - name: faiss-data
          persistentVolumeClaim:
            claimName: verbaflow-faiss-pvc

---
# ─── Persistent Volume Claims ─────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: verbaflow-uploads-pvc
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-backend
spec:
  accessModes:
    - ReadWriteMany    # RWX needed for multi-replica access; use NFS/EFS/GCS-CSI
  storageClassName: standard
  resources:
    requests:
      storage: 100Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: verbaflow-faiss-pvc
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-backend
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: standard
  resources:
    requests:
      storage: 50Gi
---
# ─── HorizontalPodAutoscaler ──────────────────────────────────────────────────
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: verbaflow-backend-hpa
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-backend
    app.kubernetes.io/component: autoscaler
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: verbaflow-backend
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300    # 5 min cooldown before scaling down
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 4
          periodSeconds: 60
        - type: Percent
          value: 100
          periodSeconds: 60
      selectPolicy: Max
