# =============================================================================
# VerbaFlow AI — Kubernetes ConfigMap
# =============================================================================
# Contains all NON-SECRET configuration values.
# Secrets (passwords, API keys) live in secrets.yaml.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: verbaflow-config
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow
    app.kubernetes.io/component: config
data:
  # ── Application ─────────────────────────────────────────────────────────────
  APP_NAME: "VerbaFlow AI"
  APP_VERSION: "1.0.0"
  APP_ENV: "production"
  DEBUG: "false"
  LOG_LEVEL: "INFO"

  # ── Database ─────────────────────────────────────────────────────────────────
  POSTGRES_DB: "verbaflow"
  POSTGRES_USER: "verbaflow"
  POSTGRES_HOST: "verbaflow-postgres"
  POSTGRES_PORT: "5432"
  DB_POOL_SIZE: "20"
  DB_MAX_OVERFLOW: "40"
  DB_POOL_TIMEOUT: "30"

  # ── Redis ────────────────────────────────────────────────────────────────────
  REDIS_HOST: "verbaflow-redis"
  REDIS_PORT: "6379"
  REDIS_CACHE_TTL: "3600"

  # ── Security ─────────────────────────────────────────────────────────────────
  ALGORITHM: "HS256"
  ACCESS_TOKEN_EXPIRE_MINUTES: "60"
  REFRESH_TOKEN_EXPIRE_DAYS: "7"
  BCRYPT_ROUNDS: "12"

  # ── AI Provider Selection ────────────────────────────────────────────────────
  EMBEDDING_PROVIDER: "google"
  LLM_PROVIDER: "gemini"
  GEMINI_MODEL: "models/gemini-2.5-flash"
  OPENAI_MODEL: "gpt-4o"
  GOOGLE_EMBEDDING_MODEL: "models/gemini-embedding-001"
  OPENAI_EMBEDDING_MODEL: "text-embedding-3-large"
  EMBEDDING_DIMENSIONS: "768"
  GEMINI_MAX_OUTPUT_TOKENS: "8192"
  GEMINI_TEMPERATURE: "0.2"
  OPENAI_TEMPERATURE: "0.2"

  # ── Vector Store ─────────────────────────────────────────────────────────────
  VECTOR_STORE_TYPE: "faiss"
  FAISS_INDEX_PATH: "/app/data/faiss_indexes"
  PINECONE_ENV: ""
  PINECONE_INDEX: "verbaflow"

  # ── Storage ──────────────────────────────────────────────────────────────────
  UPLOAD_DIR: "/app/data/uploads"
  MAX_FILE_SIZE_MB: "50"
  ALLOWED_EXTENSIONS: "pdf,docx,txt,md,csv,xlsx,pptx,html"
  STORAGE_BACKEND: "local"

  # ── RAG Pipeline ─────────────────────────────────────────────────────────────
  CHUNK_SIZE: "1000"
  CHUNK_OVERLAP: "200"
  RETRIEVAL_COUNT: "5"
  SIMILARITY_THRESHOLD: "0.7"
  RERANKING_ENABLED: "false"
  MAX_CONTEXT_LENGTH: "12000"
  CITATION_ENABLED: "true"

  # ── CORS ─────────────────────────────────────────────────────────────────────
  ALLOW_CREDENTIALS: "true"

  # ── Rate Limiting ────────────────────────────────────────────────────────────
  RATE_LIMIT_ENABLED: "true"
  RATE_LIMIT_REQUESTS_PER_MINUTE: "60"
  RATE_LIMIT_BURST: "20"

  # ── Monitoring ───────────────────────────────────────────────────────────────
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PORT: "9090"
  OTEL_SERVICE_NAME: "verbaflow-backend"
  SENTRY_ENVIRONMENT: "production"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  NEXT_PUBLIC_APP_NAME: "VerbaFlow AI"
  NEXT_PUBLIC_APP_VERSION: "1.0.0"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_ENV: "production"
