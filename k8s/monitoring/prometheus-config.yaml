# =============================================================================
# VerbaFlow AI — Prometheus Scrape Configuration
# =============================================================================
# Deploy this alongside your Prometheus instance.
# If using kube-prometheus-stack Helm chart, add these as additionalScrapeConfigs.
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-verbaflow-config
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      scrape_timeout: 10s
      external_labels:
        cluster: 'verbaflow-production'
        environment: 'production'

    # ── Alertmanager ──────────────────────────────────────────────────────────
    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    # ── Rules ─────────────────────────────────────────────────────────────────
    rule_files:
      - /etc/prometheus/rules/*.yml

    # ── Scrape Configs ────────────────────────────────────────────────────────
    scrape_configs:

      # ── VerbaFlow Backend (FastAPI + Prometheus metrics) ─────────────────
      - job_name: 'verbaflow-backend'
        kubernetes_sd_configs:
          - role: pod
            namespaces:
              names:
                - verbaflow
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: 'true'
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_pod_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            action: replace
            target_label: kubernetes_pod_name
        metric_relabel_configs:
          # Drop high-cardinality labels
          - source_labels: [__name__]
            regex: 'go_.*'
            action: drop

      # ── PostgreSQL Exporter ───────────────────────────────────────────────
      - job_name: 'verbaflow-postgres'
        static_configs:
          - targets: ['verbaflow-postgres-exporter:9187']
        labels:
          service: 'postgres'

      # ── Redis Exporter ────────────────────────────────────────────────────
      - job_name: 'verbaflow-redis'
        static_configs:
          - targets: ['verbaflow-redis-exporter:9121']
        labels:
          service: 'redis'

      # ── Kubernetes API Server ─────────────────────────────────────────────
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # ── Kubernetes Nodes ──────────────────────────────────────────────────
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)

  # ── Alert Rules ─────────────────────────────────────────────────────────────
  verbaflow-alerts.yml: |
    groups:
      - name: verbaflow.backend
        interval: 30s
        rules:
          # High error rate
          - alert: VerbaFlowHighErrorRate
            expr: |
              rate(http_requests_total{namespace="verbaflow",job="verbaflow-backend",status=~"5.."}[5m])
              / rate(http_requests_total{namespace="verbaflow",job="verbaflow-backend"}[5m]) > 0.05
            for: 5m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "High error rate on VerbaFlow backend"
              description: "Error rate is {{ $value | humanizePercentage }} for 5 minutes."

          # High latency
          - alert: VerbaFlowHighP99Latency
            expr: |
              histogram_quantile(0.99,
                rate(http_request_duration_seconds_bucket{namespace="verbaflow",job="verbaflow-backend"}[5m])
              ) > 2
            for: 5m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "High P99 latency on VerbaFlow backend"
              description: "P99 latency is {{ $value }}s."

          # Pod crash looping
          - alert: VerbaFlowPodCrashLooping
            expr: |
              rate(kube_pod_container_status_restarts_total{namespace="verbaflow"}[15m]) > 0
            for: 5m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Pod crash looping in verbaflow namespace"
              description: "Pod {{ $labels.pod }} is restarting."

          # HPA at max replicas
          - alert: VerbaFlowHPAMaxReplicas
            expr: |
              kube_horizontalpodautoscaler_status_current_replicas{namespace="verbaflow"}
              >= kube_horizontalpodautoscaler_spec_max_replicas{namespace="verbaflow"}
            for: 10m
            labels:
              severity: warning
              team: platform
            annotations:
              summary: "HPA at maximum replicas"
              description: "{{ $labels.horizontalpodautoscaler }} is at max replicas. Consider increasing maxReplicas."

          # Database connection pool exhausted
          - alert: VerbaFlowDBPoolExhausted
            expr: |
              verbaflow_db_pool_size{namespace="verbaflow"} >= verbaflow_db_pool_max_size{namespace="verbaflow"}
            for: 5m
            labels:
              severity: critical
              team: platform
            annotations:
              summary: "Database connection pool exhausted"
              description: "DB pool is at maximum capacity."
