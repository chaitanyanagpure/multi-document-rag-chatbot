# =============================================================================
# VerbaFlow AI — Kubernetes Namespace
# =============================================================================
apiVersion: v1
kind: Namespace
metadata:
  name: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow
    app.kubernetes.io/managed-by: kubectl
    environment: production
  annotations:
    description: "VerbaFlow AI Multi-Document RAG Chatbot Platform"
---
# =============================================================================
# ResourceQuota — enforce resource governance within the namespace
# =============================================================================
apiVersion: v1
kind: ResourceQuota
metadata:
  name: verbaflow-quota
  namespace: verbaflow
spec:
  hard:
    # Compute
    requests.cpu: "20"
    requests.memory: 40Gi
    limits.cpu: "60"
    limits.memory: 120Gi
    # Storage
    requests.storage: 500Gi
    persistentvolumeclaims: "20"
    # Object counts
    pods: "100"
    services: "30"
    secrets: "50"
    configmaps: "50"
    deployments.apps: "20"
    statefulsets.apps: "10"
---
# =============================================================================
# LimitRange — set default resource limits for containers without explicit ones
# =============================================================================
apiVersion: v1
kind: LimitRange
metadata:
  name: verbaflow-limit-range
  namespace: verbaflow
spec:
  limits:
    - type: Container
      default:
        cpu: "500m"
        memory: "512Mi"
      defaultRequest:
        cpu: "100m"
        memory: "128Mi"
      max:
        cpu: "8"
        memory: "16Gi"
      min:
        cpu: "50m"
        memory: "64Mi"
    - type: Pod
      max:
        cpu: "16"
        memory: "32Gi"
    - type: PersistentVolumeClaim
      max:
        storage: 200Gi
      min:
        storage: 1Gi
