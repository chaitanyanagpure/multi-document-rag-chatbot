# =============================================================================
# VerbaFlow AI — Redis Deployment
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: verbaflow-redis-pvc
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-redis
    app.kubernetes.io/component: cache
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: verbaflow-redis
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-redis
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: verbaflow-redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: verbaflow-redis
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow-redis
    app.kubernetes.io/component: cache
    app.kubernetes.io/version: "7"
spec:
  replicas: 1
  strategy:
    type: Recreate   # Recreate avoids split-brain on single PVC
  selector:
    matchLabels:
      app.kubernetes.io/name: verbaflow-redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: verbaflow-redis
        app.kubernetes.io/component: cache
      annotations:
        prometheus.io/scrape: "false"
    spec:
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        runAsNonRoot: true

      containers:
        - name: redis
          image: redis:7-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP

          command:
            - redis-server
            - "--appendonly"
            - "yes"
            - "--appendfsync"
            - "everysec"
            - "--maxmemory"
            - "512mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
            - "--loglevel"
            - "notice"
            - "--requirepass"
            - "$(REDIS_PASSWORD)"
            - "--bind"
            - "0.0.0.0"

          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: verbaflow-secrets
                  key: REDIS_PASSWORD
                  optional: true

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"

          volumeMounts:
            - name: redis-data
              mountPath: /data

          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD:-}\" ping | grep PONG"
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "redis-cli --no-auth-warning -a \"${REDIS_PASSWORD:-}\" ping | grep PONG"
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: verbaflow-redis-pvc
