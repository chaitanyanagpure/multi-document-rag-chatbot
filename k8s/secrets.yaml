# =============================================================================
# VerbaFlow AI — Kubernetes Secrets Template
# =============================================================================
# ⚠ IMPORTANT: This file contains PLACEHOLDER values only.
#   DO NOT commit real secrets to version control.
#
# Before applying:
#   1. Use `kubectl create secret` or a secrets manager (Vault, AWS SM, GCP SM)
#   2. Or replace placeholders with base64-encoded values:
#      echo -n 'my-secret' | base64
#   3. Or use Sealed Secrets / External Secrets Operator for GitOps
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: verbaflow-secrets
  namespace: verbaflow
  labels:
    app.kubernetes.io/name: verbaflow
    app.kubernetes.io/component: secrets
  annotations:
    # If using External Secrets Operator, annotate accordingly
    # externalsecrets.io/source: "aws-secretsmanager"
    description: "Core application secrets — do not store real values in this file"
type: Opaque
# All values must be base64-encoded.
# Use: echo -n 'ACTUAL_VALUE' | base64
data:
  # ── Database ──────────────────────────────────────────────────────────────
  # Placeholder: "change_me_in_production"
  POSTGRES_PASSWORD: Y2hhbmdlX21lX2luX3Byb2R1Y3Rpb24=

  # Full database URL (postgresql+asyncpg://user:pass@host:port/db)
  # Placeholder: "postgresql+asyncpg://verbaflow:change_me_in_production@verbaflow-postgres:5432/verbaflow"
  DATABASE_URL: cG9zdGdyZXNxbCthc3luY3BnOi8vdmVyYmFmbG93OmNoYW5nZV9tZV9pbl9wcm9kdWN0aW9uQHZlcmJhZmxvdy1wb3N0Z3Jlczo1NDMyL3ZlcmJhZmxvdw==

  # ── Redis ─────────────────────────────────────────────────────────────────
  # Placeholder: "" (empty = no password; set a password in production)
  REDIS_PASSWORD: ""

  # Full Redis URL
  # Placeholder: "redis://verbaflow-redis:6379/0"
  REDIS_URL: cmVkaXM6Ly92ZXJiYWZsb3ctcmVkaXM6NjM3OS8w

  # ── JWT / Security ────────────────────────────────────────────────────────
  # Placeholder: generate with: openssl rand -hex 32
  SECRET_KEY: eW91ci1zdXBlci1zZWNyZXQta2V5LW1pbmltdW0tMzItY2hhcnMtY2hhbmdlLWluLXByb2Q=

  # ── AI Provider Keys ──────────────────────────────────────────────────────
  # Placeholder: "your-gemini-api-key"
  GEMINI_API_KEY: eW91ci1nZW1pbmktYXBpLWtleQ==

  # Placeholder: "your-openai-api-key"
  OPENAI_API_KEY: eW91ci1vcGVuYWktYXBpLWtleQ==

  # ── Vector Store Keys ─────────────────────────────────────────────────────
  # Placeholder: "your-pinecone-api-key"
  PINECONE_API_KEY: eW91ci1waW5lY29uZS1hcGkta2V5

  # ── Cloud Storage Keys ────────────────────────────────────────────────────
  # Placeholder: "your-aws-access-key-id"
  AWS_ACCESS_KEY_ID: eW91ci1hd3MtYWNjZXNzLWtleS1pZA==

  # Placeholder: "your-aws-secret-access-key"
  AWS_SECRET_ACCESS_KEY: eW91ci1hd3Mtc2VjcmV0LWFjY2Vzcy1rZXk=

  # ── Email / SMTP ──────────────────────────────────────────────────────────
  # Placeholder: "your-smtp-password"
  SMTP_PASSWORD: eW91ci1zbXRwLXBhc3N3b3Jk

  # ── Observability ─────────────────────────────────────────────────────────
  # Placeholder: "https://your-sentry-dsn@sentry.io/project"
  SENTRY_DSN: aHR0cHM6Ly95b3VyLXNlbnRyeS1kc25Ac2VudHJ5LmlvL3Byb2plY3Q=

---
# =============================================================================
# Docker Registry Pull Secret
