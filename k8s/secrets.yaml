# Required if pulling from a private container registry.
# Create with:
#   kubectl create secret docker-registry verbaflow-registry-secret \
#     --docker-server=ghcr.io \
#     --docker-username=YOUR_GITHUB_USERNAME \
#     --docker-password=YOUR_GITHUB_PAT \
#     --docker-email=team@verbaflow.ai \
#     --namespace=verbaflow
# =============================================================================
# apiVersion: v1
# kind: Secret
# metadata:
#   name: verbaflow-registry-secret
#   namespace: verbaflow
# type: kubernetes.io/dockerconfigjson
# data:
#   .dockerconfigjson: <base64-encoded-docker-config>
